workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Setup Flutter and build
        script: |
          FLUTTER_VERSION="3.44.3"
          FLUTTER_DIR="$HOME/flutter-$FLUTTER_VERSION"

          if [ ! -d "$FLUTTER_DIR" ]; then
            echo "Downloading Flutter $FLUTTER_VERSION..."
            git clone --depth 1 -b "$FLUTTER_VERSION" \
              https://github.com/flutter/flutter.git "$FLUTTER_DIR"
          fi

          export PATH="$FLUTTER_DIR/bin:$PATH"
          flutter --version
          flutter pub get
          flutter build ios --debug --no-codesign
      - name: Package IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr UnsignedApp.ipa Payload
          echo "IPA created: $(pwd)/UnsignedApp.ipa ($(wc -c < UnsignedApp.ipa) bytes)"
    artifacts:
      - build/ios/iphoneos/UnsignedApp.ipa
