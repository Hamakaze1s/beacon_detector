workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Setup Flutter and build
        script: |
          # Try pre-installed Flutter, fallback to download
          FLUTTER_PATHS=(
            "$HOME/programs/flutter/bin"
            "/usr/local/share/flutter/bin"
            "$HOME/flutter/bin"
          )
          FOUND=false
          for p in "${FLUTTER_PATHS[@]}"; do
            if [ -f "$p/flutter" ]; then
              export PATH="$p:$PATH"
              FOUND=true
              break
            fi
          done
          if [ "$FOUND" = false ]; then
            echo "Downloading Flutter..."
            git clone --depth 1 -b stable https://github.com/flutter/flutter.git "$HOME/flutter"
            export PATH="$HOME/flutter/bin:$PATH"
          fi

          flutter --version
          flutter pub get
          flutter build ios --debug --no-codesign
      - name: Package IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr UnsignedApp.ipa Payload
          echo "IPA created: $(pwd)/UnsignedApp.ipa ($(wc -c < UnsignedApp.ipa) bytes)"
    artifacts:
      - build/ios/iphoneos/UnsignedApp.ipa
