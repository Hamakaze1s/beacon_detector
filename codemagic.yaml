workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Setup Flutter and build
        script: |
          set -e

          FLUTTER_VERSION="3.44.3"
          FLUTTER_DIR="$HOME/flutter-$FLUTTER_VERSION"

          if [ ! -d "$FLUTTER_DIR" ]; then
            echo "Downloading Flutter $FLUTTER_VERSION..."
            git clone --depth 1 -b "$FLUTTER_VERSION" \
              https://github.com/flutter/flutter.git "$FLUTTER_DIR"
          fi

          export PATH="$FLUTTER_DIR/bin:$PATH"
          flutter --version
          flutter pub get
          flutter precache --ios

          cd ios
          pod install

          echo "=== xcodebuild ==="
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath ../build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

          echo "=== Build output tree ==="
          find build/ios -type d -name "*.app" || echo "No .app found"

          cd ..
      - name: Package IPA
        script: |
          set -e
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found!"
            find build/ios -type f | head -30
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH" | head -20
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr UnsignedApp.ipa Payload
          echo "IPA created: $(pwd)/UnsignedApp.ipa ($(wc -c < UnsignedApp.ipa) bytes)"
    artifacts:
      - UnsignedApp.ipa