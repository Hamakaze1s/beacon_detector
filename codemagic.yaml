workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Setup Flutter and build
        script: |
          set -e

          FLUTTER_VERSION="3.44.3"
          FLUTTER_DIR="$HOME/flutter-$FLUTTER_VERSION"

          if [ ! -d "$FLUTTER_DIR" ]; then
            echo "Downloading Flutter $FLUTTER_VERSION..."
            git clone --depth 1 -b "$FLUTTER_VERSION" \
              https://github.com/flutter/flutter.git "$FLUTTER_DIR"
          fi

          export PATH="$FLUTTER_DIR/bin:$PATH"
          flutter --version
          flutter pub get
          flutter build ios --debug --no-codesign

          echo "=== Build output ==="
          ls -la build/ios/iphoneos/ | head -20
      - name: Package IPA
        script: |
          set -e
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: $APP_PATH not found!"
            find build/ios -type d -name "*.app" || true
            exit 1
          fi
          echo "App size: $(du -sh "$APP_PATH")"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr UnsignedApp.ipa Payload
          echo "IPA created: $(pwd)/UnsignedApp.ipa ($(du -h UnsignedApp.ipa | cut -f1))"
    artifacts:
      - UnsignedApp.ipa

  ios-testflight:
    name: iOS TestFlight Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      # Name of the Apple Developer Portal / App Store Connect integration
      # created under Codemagic > Team settings > Integrations. Must match exactly.
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: "com.nict.beacondetector"
      flutter: 3.44.3
      xcode: latest
    scripts:
      - name: Fetch signing files (create certificate/profile if missing)
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter build ipa for TestFlight
        script: |
          set -e
          # Build number comes from pubspec.yaml's version (0.1.0+1 -> build number 1).
          # Bump the number after "+" in pubspec.yaml before each new TestFlight upload -
          # Apple rejects a build number that isn't strictly higher than the last one
          # submitted for this bundle ID.
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          # TODO: must match an Internal Testing group name you create under
          # App Store Connect > your app > TestFlight > Internal Testing.
          - "Internal Testers"